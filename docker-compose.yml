version: '3.8'

services:
  bot:
    build: .
    container_name: whatsapp-birthday-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./.wwebjs_auth:/app/.wwebjs_auth
    environment:
      # Tijdzone voor de node-cron jobs (bij voorkeur niet veranderen)
      - TZ=Europe/Amsterdam
